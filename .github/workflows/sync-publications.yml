name: Orenu sync (Phase 1a + 1b + 2 + 3a)

# Per ADR-024 / ADR-024.1.
#
# Runs Orenu → site sync scripts sequentially in one job:
#   - scripts/sync_publications.py (Phase 1a; dim_publication)
#   - scripts/sync_engagements.py  (Phase 1b; fact_speaker_engagement)
#   - scripts/sync_credentials.py  (Phase 2;  dim_credential)
#   - scripts/sync_awards.py       (Phase 3a; dim_award)
# Opens a single combined PR if any script produces file changes; if
# all runs are no-ops, no PR is opened (zero-churn idempotency).
#
# Schedule: daily at 06:00 UTC (off-peak; far from typical CI batch windows
# and far from the user's working hours so any "Daily sync" PR notification
# lands fresh in the morning, not mid-day).
#
# Manual trigger: workflow_dispatch enabled so the user can force a sync
# run anytime (e.g., after flipping public_visibility on a new row in
# Orenu and wanting the PR immediately rather than waiting for the daily).
#
# Required GitHub repository configuration (one-time setup):
#   1. Settings → Secrets and variables → Actions → New repository secret
#      Name: ORENU_DATABASE_URL
#      Value: read-only Postgres connection string for the Orenu DB
#             (suggest a dedicated `sync_publications_ro` role scoped to
#             SELECT on public.dim_publication; current setup uses the
#             standard credential — rotate to read-only role in Phase 1b)
#   2. Settings → Actions → General → Workflow permissions:
#      ✓ "Read and write permissions"
#      ✓ "Allow GitHub Actions to create and approve pull requests"
#      (required for the peter-evans/create-pull-request action to open PRs)

on:
  schedule:
    - cron: '0 6 * * *'  # daily 06:00 UTC
  workflow_dispatch:
  # Also run on PRs that touch the script itself so test changes / regex
  # tweaks are CI-validated against the same dry-run logic.
  pull_request:
    paths:
      - 'scripts/sync_*.py'
      - 'scripts/requirements*.txt'
      - 'tests/test_sync_*.py'
      - '.github/workflows/sync-publications.yml'

permissions:
  contents: write       # for committing the diff + pushing the branch
  pull-requests: write  # for opening the auto-PR

jobs:
  test:
    # Unit-test the script logic on every trigger (cheap; ~5 seconds).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-dev.txt
      - run: pip install -r scripts/requirements-dev.txt
      - run: python -m pytest tests/ -v

  sync:
    # Only run the live sync on scheduled / manual triggers — not on PR
    # validation runs (PRs don't have access to the secret anyway).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Run sync — publications (Phase 1a)
        id: sync_pubs
        env:
          ORENU_DATABASE_URL: ${{ secrets.ORENU_DATABASE_URL }}
        run: |
          # Capture stdout + exit code; tee to /tmp/ (NOT the repo
          # workspace — files in $GITHUB_WORKSPACE get picked up by
          # `git status --porcelain` and spuriously trigger the
          # peter-evans create-PR step). Non-zero exit codes (drift /
          # stubs / orphans) are NOT fatal; they should surface in the
          # workflow log + artifact only.
          set +e
          python scripts/sync_publications.py --apply 2>&1 | tee /tmp/sync-publications-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Run sync — engagements (Phase 1b)
        id: sync_engs
        env:
          ORENU_DATABASE_URL: ${{ secrets.ORENU_DATABASE_URL }}
        run: |
          set +e
          python scripts/sync_engagements.py 2>&1 | tee /tmp/sync-engagements-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Run sync — credentials (Phase 2)
        id: sync_creds
        env:
          ORENU_DATABASE_URL: ${{ secrets.ORENU_DATABASE_URL }}
        run: |
          set +e
          python scripts/sync_credentials.py --apply 2>&1 | tee /tmp/sync-credentials-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Run sync — awards (Phase 3a)
        id: sync_awards
        env:
          ORENU_DATABASE_URL: ${{ secrets.ORENU_DATABASE_URL }}
        run: |
          set +e
          python scripts/sync_awards.py 2>&1 | tee /tmp/sync-awards-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Warning annotation on non-zero exit
        if: steps.sync_pubs.outputs.exit_code != '0' || steps.sync_engs.outputs.exit_code != '0' || steps.sync_creds.outputs.exit_code != '0' || steps.sync_awards.outputs.exit_code != '0'
        run: |
          echo "::warning ::Orenu sync emitted warnings (pubs exit=${{ steps.sync_pubs.outputs.exit_code }}, engs exit=${{ steps.sync_engs.outputs.exit_code }}, creds exit=${{ steps.sync_creds.outputs.exit_code }}, awards exit=${{ steps.sync_awards.outputs.exit_code }}). See workflow log + sync-output artifact."

      - name: Detect file changes
        id: diff
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git status --porcelain
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "(no file changes from either script — sync is idempotent)"
          fi

      - name: Create or update Pull Request
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: orenu-sync/daily
          delete-branch: true
          commit-message: |
            chore(orenu-sync): site content frontmatter — daily run

            Generated by .github/workflows/sync-publications.yml.
            Sources of truth:
              - dim_publication            WHERE public_visibility = true (Phase 1a)
              - fact_speaker_engagement    WHERE public_visibility = true (Phase 1b)
              - dim_credential             WHERE public_visibility = true (Phase 2)
              - dim_award                  WHERE public_visibility = true (Phase 3a)

            Assisted-By: Claude (Anthropic) <noreply@anthropic.com>
          title: 'chore(orenu-sync): site content — daily run'
          body: |
            ## Daily Orenu → site sync

            Automated daily runs of the Orenu sync scripts.
            Per [ADR-024](https://github.com/VitorMRodovalho/rodovalho-finance/blob/main/decisions/ADR-024-orenu-as-source-of-truth-personal-branding-sites.md).

            **Phase 1a · publications** — exit ${{ steps.sync_pubs.outputs.exit_code }}
            **Phase 1b · engagements** — exit ${{ steps.sync_engs.outputs.exit_code }}
            **Phase 2 · credentials** — exit ${{ steps.sync_creds.outputs.exit_code }}
            **Phase 3a · awards** — exit ${{ steps.sync_awards.outputs.exit_code }}

            (Exit `0` = clean run · `1` = drift / stubs / orphans surfaced for review · `2` = fatal error.)

            ## Review checklist

            - [ ] Drift warnings — confirm canonical version vs MDX
            - [ ] Stubs needed — create MDX for new Orenu public rows
            - [ ] Orphan MDX — flip Orenu `public_visibility = true` or move MDX to `_archive/`
            - [ ] Citation updates — sanity-check counts vs Scholar before merge

            Auto-generated; safe to close without merging if changes look wrong. Full sync output attached as workflow artifacts.
          labels: |
            orenu-sync
            automated

      - name: Upload sync output as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sync-output
          path: |
            /tmp/sync-publications-output.txt
            /tmp/sync-engagements-output.txt
            /tmp/sync-credentials-output.txt
            /tmp/sync-awards-output.txt
          if-no-files-found: warn

      - name: Summary when no changes
        if: steps.diff.outputs.has_changes != 'true'
        run: echo "::notice ::No file changes from either sync run — fully idempotent."
