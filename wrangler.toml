# Cloudflare Workers config — Workers Static Assets with a thin redirect wrapper.
#
# worker.js exists solely to 301-redirect www.sarahrodovalho.com → apex.
# Everything else falls through to env.ASSETS, which serves dist/ identically
# to the prior static-only deployment. Mirrors vitormr-site post-PR-#31.
#
# Build (dashboard-configured): pnpm install && pnpm build → ./dist
# Deploy (dashboard-configured): npx wrangler deploy on push to main
# Custom domain `sarahrodovalho.com` apex: configured via dashboard
# (Workers & Pages → sarah-rodovalho-site → Settings → Triggers → Custom Domains).

name = "sarah-rodovalho-site"
main = "./worker.js"
compatibility_date = "2026-05-09"
workers_dev = false

# Non-secret config consumed by worker.js for /admin/api/metrics.
# CF_ANALYTICS_TOKEN is a wrangler secret (Account Analytics:Read) and
# is NOT declared here — install via `wrangler secret put CF_ANALYTICS_TOKEN`.
[vars]
CF_ACCOUNT_ID = "67d4c2262aebde75efb5fb6a1bb12cd2"
CF_WEB_ANALYTICS_SITE_TAG = "cc6508bd183d4de494749127e6dd03b6"
CF_SITE_LAUNCH_DATE = "2026-05-09"

[assets]
directory = "./dist"
binding = "ASSETS"
# 404 handling: serve the custom 404.html (built by Astro from
# src/pages/404.astro). Alternative is "single-page-application"
# for SPA routing — not what we want here.
not_found_handling = "404-page"
# Default behaviour serves matched static assets BEFORE invoking the Worker,
# which means the www→apex redirect in worker.js never fires for paths that
# exist in dist/ (i.e. every page). run_worker_first = true inverts that:
# every request hits worker.js first, and non-www requests fall through via
# env.ASSETS.fetch. Latency overhead per request is microseconds.
# Critical: load-bearing — first vitormr-site deploy without this flag
# appeared to do nothing because matched assets bypassed the Worker entirely.
run_worker_first = true
